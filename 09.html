            },

                title: '📝 测试 extract_ip 函数（详细）',

                content: '<div><div class="code-block" style="font-size:11px; max-height:280px; overflow-y:auto;"><span class="comment"># tests/test_analyzer.py</span><br><span class="keyword">import</span> pytest<br><span class="keyword">from</span> logan.analyzer <span class="keyword">import</span> extract_ip<br><br><span class="keyword">class</span> <span class="func">TestExtractIP</span>:<br>    <span class="keyword">def</span> <span class="func">test_standard_ip</span>(self):<br>        line = <span class="string">"Failed password for root from 192.168.1.100 port 22"</span><br>        <span class="keyword">assert</span> extract_ip(line) == <span class="string">"192.168.1.100"</span><br><br>    <span class="keyword">def</span> <span class="func">test_authentication_failure</span>(self):<br>        line = <span class="string">"authentication failure; logname=root from 10.0.0.55"</span><br>        <span class="keyword">assert</span> extract_ip(line) == <span class="string">"10.0.0.55"</span><br><br>    <span class="keyword">def</span> <span class="func">test_no_ip</span>(self):<br>        line = <span class="string">"Accepted password for alice"</span><br>        <span class="keyword">assert</span> extract_ip(line) <span class="keyword">is</span> <span class="keyword">None</span><br><br>    <span class="keyword">def</span> <span class="func">test_multiple_ips</span>(self):<br>        line = <span class="string">"from 192.168.1.100 via 10.0.0.1"</span><br>        <span class="keyword">assert</span> extract_ip(line) == <span class="string">"192.168.1.100"</span><br><br>    <span class="keyword">def</span> <span class="func">test_invalid_ip_format</span>(self):<br>        line = <span class="string">"IP: 999.999.999.999"</span><br>        <span class="comment"># 正则只匹配格式，不校验范围</span><br>        <span class="keyword">assert</span> extract_ip(line) == <span class="string">"999.999.999.999"</span></div><div class="tip" style="margin-top:4px;">💡 <strong>测试原则：</strong> 每个函数至少要有 <strong>正常情况</strong> + <strong>边界情况</strong> 的测试。</div></div>'
            },

            {

div></div>'

        var current = 0;
        var contentEl = document.getElementById('slideContent');
        var prevBtn = document.getElementById('prevBtn');
        var nextBtn = document.getElementById('nextBtn');
        var indicator = document.getElementById('pageIndicator');

        function render() {
            var s = slides[current];
            contentEl.innerHTML = '<span class="badge">📘 第 9 天</span><div class="slide-title">' + s.title + '</div><div class="slide-subtitle">' + s.subtitle + '</div><hr>' + s.content;
            indicator.textContent = (current + 1) + ' / ' + slides.length;
            prevBtn.disabled = (current === 0);
            nextBtn.disabled = (current === slides.length - 1);
            contentEl.scrollTop = 0;
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowLeft') { e.preventDefault();
                goTo(current - 1); }
            if (e.key === 'ArrowRight') { e.preventDefault();
                goTo(current + 1); }
        });

        function goTo(idx) {
            if (idx < 0 || idx >= slides.length) return;
            current = idx;
            render();
        }
        prevBtn.addEventListener('click', function() { goTo(current - 1); });
        nextBtn.addEventListener('click', function() { goTo(current + 1); });

        render();
    </script>
